name: MediQueue CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────
  # Job 1 — Backend: lint + test (FastAPI / Python)
  # ──────────────────────────────────────────────
  backend-ci:
    name: Backend CI (Python 3.12)
    runs-on: ubuntu-latest

    env:
      SECRET_KEY: ci-test-secret-key-not-for-production
      ENVIRONMENT: test
      APP_NAME: MediQueue
      APP_VERSION: "1.0.0"
      # Dummy DB/Redis URLs — not used by TestClient tests, but required by app config
      DATABASE_URL: postgresql+asyncpg://mediqueue:mediqueue@localhost:5432/mediqueue_test
      REDIS_URL: redis://localhost:6379/0

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short

  # ──────────────────────────────────────────────
  # Job 2 — Frontend: lint + build (React / Vite)
  # ──────────────────────────────────────────────
  frontend-ci:
    name: Frontend CI (Node 24)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    env:
      VITE_API_URL: https://mediqueue.onrender.com

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Format (Prettier auto-fix)
        run: npm run format

      - name: Lint (ESLint)
        run: npm run lint

      - name: Build production bundle
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ──────────────────────────────────────────────
  # Job 3 — Docker: verify both images build
  # ──────────────────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: mediqueue-backend:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: mediqueue-frontend:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────
  # Job 4 — Deployment info (always runs)
  # ──────────────────────────────────────────────
  deploy-info:
    name: Deployment Info
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    if: always()

    steps:
      - name: Print live deployment URLs
        run: |
          echo "=============================================="
          echo "  MediQueue — Live Deployment Info"
          echo "=============================================="
          echo "  Frontend (Vercel) : https://medi-queue.vercel.app"
          echo "  Backend  (Render) : https://mediqueue.onrender.com"
          echo "  API Docs          : https://mediqueue.onrender.com/api/docs"
          echo "  Health Check      : https://mediqueue.onrender.com/api/health"
          echo "  Commit SHA        : ${{ github.sha }}"
          echo "  Branch            : ${{ github.ref_name }}"
          echo "=============================================="

      - name: Ping production health endpoint
        run: |
          echo "Pinging production health endpoint..."
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 \
            https://mediqueue.onrender.com/api/health || echo "000")
          echo "HTTP Status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "✅ Production backend is healthy"
          elif [ "$HTTP_STATUS" = "000" ]; then
            echo "⚠️  Backend may be sleeping (Render free tier cold start) — not a build failure"
          else
            echo "⚠️  Unexpected status: $HTTP_STATUS"
          fi
